[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    --cov=src
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=85
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (require database/services)
    slow: Slow tests (AI model calls, email sending)
    security: Security-related tests
filterwarnings =
    ignore:The 'app' shortcut is now deprecated.*:DeprecationWarning:httpx\._client
    ignore:Please use `import python_multipart` instead\.:PendingDeprecationWarning:starlette\.formparsers
    ignore::DeprecationWarning:sqlalchemy\.
    ignore::PendingDeprecationWarning:passlib\.

